server {
	listen 80;
    # Handle all hostnames as HTTPS
	server_name _;
    # Disable NGINX server info (i.e. on error screens)
	server_tokens off;

    # Set max file upload size
    client_max_body_size 500M;

    # Redirect requests to HTTPS
	location / {
		return 301 https://$server_name$request_uri;
	}	
}

server {
    # Handle all hostnames as HTTPS
	server_name _;
    # Serve SSL over port 443
	listen 443 ssl;
    # Disable NGINX server info (i.e. on error screens)
	server_tokens off;

    # Proxy pass all requests to the blog container
	location / {
		proxy_pass	http://blog:2368;
	        proxy_set_header    X-Real-IP $remote_addr;
	        proxy_set_header    Host      $host;
		proxy_set_header X-Forwarded-Proto $scheme;
	        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	}

    # Set locations for SSL cert files
	ssl_certificate     /etc/nginx/conf.d/ssl/fullchain.pem;
	ssl_certificate_key 	/etc/nginx/conf.d/ssl/privkey.pem;
}
